<div class="input-group">
  <input type="time" id="startzeit" required>
  <label>Startzeit</label>
</div>

<div class="input-group">
  <input type="time" id="pauseStart" required>
  <label>Pausenbeginn</label>
</div>

<div class="input-group">
  <input type="time" id="pauseEnde" required>
  <label>Pausenende</label>
</div>

<button onclick="berechneFeierabend()">Feierabend berechnen</button>

<script>
function berechneFeierabend() {
  const start = document.getElementById("startzeit").value;
  const pStart = document.getElementById("pauseStart").value;
  const pEnd = document.getElementById("pauseEnde").value;
  if (!start || !pStart || !pEnd) return alert("Alle Zeiten eingeben");

  const [sh, sm] = start.split(":").map(Number);
  const [ph, pm] = pStart.split(":").map(Number);
  const [peh, pem] = pEnd.split(":").map(Number);

  const startDate = new Date(0,0,0,sh,sm);
  const pauseStartDate = new Date(0,0,0,ph,pm);
  const pauseEndDate = new Date(0,0,0,peh,pem);

  // Pausenzeit in Minuten
  const pauseMinutes = (pauseEndDate - pauseStartDate) / 60000;

  // Zielarbeitszeit 8h59min = 539 min
  const totalWorkMinutes = 539;

  // Arbeitszeit vor Pause
  const workBeforePause = (pauseStartDate - startDate) / 60000;

  // Noch zu arbeiten nach Pause
  const remainingWork = totalWorkMinutes - workBeforePause;

  // Feierabendzeit
  const feierabendDate = new Date(pauseEndDate.getTime() + remainingWork*60000);

  const f = n => n.toString().padStart(2,"0");
  const out = document.getElementById("ergebnis");
  out.textContent = `🎉 Feierabend um ${f(feierabendDate.getHours())}:${f(feierabendDate.getMinutes())}`;
  out.classList.add("show");
}
</script>
